name: Ping FireQuiz API

on:
  schedule:
    - cron: "*/5 0-12 * * *"

  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping /api/status
        run: |
          curl --fail --silent --show-error \
            -X GET https://firequiz-backend.onrender.com/api/status
